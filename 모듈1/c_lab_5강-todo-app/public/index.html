<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>내 Todo 앱 · 로컬 SQLite</title>
<style>
  :root{--bg:#f4f2ea;--card:#fff;--ink:#1c1b18;--muted:#6b6a63;--line:#e2ded2;--accent:#2563eb;--done:#9aa0a6;--danger:#c0392b;--chip:#eef2ff;--chip-ink:#3730a3}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Pretendard","Apple SD Gothic Neo",system-ui,sans-serif;line-height:1.5}
  .wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px}
  h1{font-size:1.7rem;margin:0 0 4px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:.9rem;margin:0 0 24px}
  form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;display:grid;gap:10px;margin-bottom:20px}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  input[type=text],input[type=date]{flex:1;min-width:120px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font:inherit;background:#fff;color:var(--ink)}
  input:focus{outline:none;border-color:var(--accent)}
  button{font:inherit;cursor:pointer;border:0;border-radius:9px}
  .add{background:var(--accent);color:#fff;font-weight:700;padding:10px 18px}
  .add:hover{filter:brightness(1.05)}
  .filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .filters button{background:transparent;border:1px solid var(--line);color:var(--muted);padding:6px 13px;border-radius:999px;font-size:.85rem}
  .filters button.on{background:var(--ink);color:var(--bg);border-color:var(--ink);font-weight:700}
  ul{list-style:none;margin:0;padding:0;display:grid;gap:10px}
  li{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
  li.done .title{text-decoration:line-through;color:var(--done)}
  .chk{width:22px;height:22px;margin-top:2px;flex:0 0 auto;accent-color:var(--accent);cursor:pointer}
  .body{flex:1;min-width:0}
  .title{font-weight:600;word-break:break-all}
  .meta{margin-top:5px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:.8rem;color:var(--muted)}
  .due{background:#fff3e0;color:#9a5b00;border-radius:6px;padding:1px 7px;font-weight:600}
  .due.over{background:#fdecea;color:var(--danger)}
  .chip{background:var(--chip);color:var(--chip-ink);border-radius:999px;padding:1px 9px;font-weight:600}
  .del{background:transparent;color:var(--muted);font-size:1.1rem;padding:2px 6px;line-height:1}
  .del:hover{color:var(--danger)}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
  .count{font-size:.82rem;color:var(--muted);margin:0 0 10px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 내 Todo 앱</h1>
  <p class="sub">로컬 SQLite(<code>todo.db</code>)에 저장 — 껐다 켜도 남습니다. · 노드5 실습</p>

  <form id="form">
    <input type="text" id="title" placeholder="할 일을 입력하세요…" autocomplete="off" required>
    <div class="row">
      <input type="date" id="due" title="마감일(선택)">
      <input type="text" id="tags" placeholder="태그: 쉼표로 구분 (예: 공부, 급함)" autocomplete="off">
      <button type="submit" class="add">추가</button>
    </div>
  </form>

  <div class="filters">
    <button data-f="all" class="on">전체</button>
    <button data-f="active">남은 것</button>
    <button data-f="done">완료</button>
    <button data-f="today">오늘 마감</button>
  </div>

  <p class="count" id="count"></p>
  <ul id="list"></ul>
</div>

<script>
const API = '/api/todos';
let todos = [], filter = 'all';
const $ = id => document.getElementById(id);
const todayStr = () => new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD

async function load(){ todos = await (await fetch(API)).json(); render(); }

function visible(){
  if(filter==='active') return todos.filter(t=>!t.is_done);
  if(filter==='done')   return todos.filter(t=>t.is_done);
  if(filter==='today')  return todos.filter(t=>t.due_date===todayStr());
  return todos;
}

function render(){
  const list = $('list'); list.innerHTML='';
  const items = visible();
  const remain = todos.filter(t=>!t.is_done).length;
  $('count').textContent = `전체 ${todos.length}개 · 남은 일 ${remain}개`;
  if(!items.length){ list.innerHTML = '<div class="empty">🍃 표시할 할 일이 없어요.</div>'; return; }
  for(const t of items){
    const li = document.createElement('li');
    if(t.is_done) li.className='done';
    const over = t.due_date && !t.is_done && t.due_date < todayStr();
    li.innerHTML = `
      <input type="checkbox" class="chk" ${t.is_done?'checked':''}>
      <div class="body">
        <div class="title"></div>
        <div class="meta">
          ${t.due_date?`<span class="due ${over?'over':''}">📅 ${t.due_date}${over?' (지남)':''}</span>`:''}
          ${t.tags.map(x=>`<span class="chip">#${escapeHtml(x)}</span>`).join('')}
        </div>
      </div>
      <button class="del" title="삭제">✕</button>`;
    li.querySelector('.title').textContent = t.title;
    li.querySelector('.chk').onchange = () => toggle(t.id, !t.is_done);
    li.querySelector('.del').onclick   = () => remove(t.id);
    list.appendChild(li);
  }
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

$('form').onsubmit = async e => {
  e.preventDefault();
  const title = $('title').value.trim(); if(!title) return;
  const tags = $('tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  todos = await (await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({title, due_date:$('due').value||null, tags})})).json();
  e.target.reset(); render(); $('title').focus();
};

async function toggle(id, is_done){
  todos = await (await fetch(`${API}/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({is_done})})).json(); render();
}
async function remove(id){
  todos = await (await fetch(`${API}/${id}`,{method:'DELETE'})).json(); render();
}

document.querySelectorAll('.filters button').forEach(b=>{
  b.onclick = () => { filter=b.dataset.f; document.querySelectorAll('.filters button').forEach(x=>x.classList.toggle('on',x===b)); render(); };
});

load();
</script>
</body>
</html>
