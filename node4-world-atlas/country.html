<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Atlas</title>
<script>if(localStorage.getItem('theme')!=='light')document.documentElement.dataset.theme='dark';</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400;1,9..144,500&family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap');
  :root{--paper:#f4f2ea;--ink:#1c1b18;--muted:#8b8575;--faint:#b7b1a2;--line:#e2ded1;--card:#fbfaf4;--sel:#1c1b18;--star:#b5773a;--sans:'Noto Sans KR',sans-serif;--disp:'Space Grotesk','Noto Sans KR',sans-serif;--serif:'Fraunces',Georgia,serif;--radius:14px}
  html[data-theme="dark"]{--paper:#100f0c;--ink:#f0ebdf;--muted:#948d7e;--faint:#615b50;--line:#2a2620;--card:#191713;--sel:#f0ebdf;--star:#dda15e}
  .themebtn{border:1px solid var(--line);background:var(--card);border-radius:999px;width:32px;height:29px;font-size:.9rem;cursor:pointer;line-height:1;display:grid;place-items:center;transition:.15s;color:var(--ink)}
  .themebtn:hover{border-color:var(--ink)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:960px;margin:auto;padding:0 26px}
  /* top bar */
  .topbar{position:sticky;top:0;z-index:5;background:rgba(244,242,234,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  html[data-theme="dark"] .topbar{background:rgba(16,15,12,.9)}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
  .back{font-family:var(--disp);font-size:.82rem;font-weight:700;letter-spacing:.04em;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
  .back:hover{color:var(--muted)}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .topbar .brand{font-family:var(--disp);font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .langsw{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--card)}
  .langsw button{font-family:var(--disp);font-weight:700;font-size:.7rem;letter-spacing:.06em;border:0;background:transparent;color:var(--muted);padding:5px 11px;cursor:pointer;transition:.15s}
  .langsw button.on{background:var(--sel);color:var(--paper)}
  /* hero */
  .hero{position:relative;height:min(56vh,460px);background:var(--ink) center/cover no-repeat;display:flex;align-items:flex-end;overflow:hidden}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(20,18,14,.82) 0%,rgba(20,18,14,.15) 55%,rgba(20,18,14,.35) 100%)}
  .hero.loading{background:linear-gradient(135deg,#2a2823,#14120e)}
  .hero-in{position:relative;z-index:2;width:100%}
  .hero-in .wrap{padding-bottom:30px}
  .hero .flag{height:38px;width:auto;border-radius:4px;box-shadow:0 2px 10px rgba(0,0,0,.4);display:block;margin-bottom:14px}
  .hero h1{color:#fff;font-weight:900;font-size:clamp(2.2rem,7vw,4.2rem);line-height:1;letter-spacing:-.03em;margin:0}
  html[lang="en"] .hero h1{text-transform:uppercase;letter-spacing:-.01em}
  .flagblk{display:grid;grid-template-columns:132px 1fr;gap:24px;align-items:center}
  .flagblk .fimg{width:100%;aspect-ratio:3/2;object-fit:cover;border-radius:8px;border:1px solid var(--line);box-shadow:0 2px 10px rgba(0,0,0,.12)}
  .flagblk p{margin:0;color:var(--ink);line-height:1.75;font-size:1.02rem}
  @media(max-width:640px){ .flagblk{grid-template-columns:1fr;gap:14px} .flagblk .fimg{max-width:180px} }
  .hero .sub{font-family:var(--disp);color:rgba(255,255,255,.82);font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;margin-top:12px}
  .hero .credit{position:absolute;bottom:10px;right:22px;z-index:2;font-family:var(--disp);font-size:.64rem;letter-spacing:.03em;color:rgba(255,255,255,.55)}
  /* breadcrumb */
  .crumb{font-family:var(--disp);font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:24px 0 0}
  .crumb a{text-decoration:none}.crumb a:hover{color:var(--ink)}
  .crumb .sep{margin:0 8px;color:var(--faint)}
  .crumb b{color:var(--ink)}
  /* sections */
  section.blk{padding:34px 0;border-bottom:1px solid var(--line)}
  .lbl{font-family:var(--disp);font-size:.72rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
  .lead-txt{font-size:1.18rem;line-height:1.7;letter-spacing:-.01em;max-width:60ch;font-weight:600}
  html[lang="en"] .lead-txt{font-family:var(--serif);font-style:italic;font-weight:500;font-size:1.42rem;line-height:1.5}
  .about-txt{margin:18px 0 0;color:var(--muted);line-height:1.85;font-size:1rem;max-width:66ch;white-space:pre-wrap}
  .about-more{display:inline-block;margin-top:12px;font-family:var(--disp);font-size:.78rem;font-weight:700;text-decoration:none;border-bottom:1.5px solid var(--ink);padding-bottom:1px}
  .about-more:hover{opacity:.6}
  .facts{display:grid;grid-template-columns:repeat(2,1fr);gap:0 40px}
  .fact{display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid var(--line)}
  .fact .k{font-family:var(--disp);color:var(--muted);font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;flex:0 0 auto;padding-top:3px}
  .fact .v{text-align:right;font-weight:600}
  .scaleviz{margin-top:22px;display:grid;gap:11px}
  .sv-row{display:grid;grid-template-columns:52px 1fr auto;gap:13px;align-items:center}
  .sv-k{font-family:var(--disp);color:var(--muted);font-size:.7rem;letter-spacing:.05em;text-transform:uppercase}
  .sv-bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden}
  .sv-bar i{display:block;height:100%;background:var(--star);border-radius:999px;transition:width .5s ease}
  .sv-v{font-weight:600;font-size:.86rem;white-space:nowrap}
  .sv-cap{font-family:var(--disp);font-size:.68rem;color:var(--faint);letter-spacing:.03em;margin-top:2px}
  .place{display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:start}
  .place .pimg{width:100%;aspect-ratio:4/3;border-radius:12px;background:var(--card) center/cover no-repeat;border:1px solid var(--line)}
  .place h3{margin:0 0 8px;font-size:1.35rem;font-weight:900;letter-spacing:-.01em}
  html[lang="en"] .place h3{font-family:var(--serif);font-style:italic;font-weight:500;font-size:1.55rem}
  .place p{margin:0;color:var(--ink);line-height:1.75}
  .place .plink{font-family:var(--disp);font-size:.78rem;font-weight:700;text-decoration:none;border-bottom:1.5px solid var(--ink);padding-bottom:1px;display:inline-block;margin-top:14px}
  .place .plink:hover{opacity:.6}
  .fun-card{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:26px 28px;line-height:1.75;font-size:1.02rem}
  .fun-card .lbl{color:rgba(255,255,255,.55)}
  /* reactions + fav */
  .actions{display:flex;gap:12px;flex-wrap:wrap}
  .rbtn{flex:1;min-width:150px;padding:14px;border:1px solid var(--line);border-radius:12px;background:transparent;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink);transition:.15s}
  .rbtn:hover{border-color:var(--ink)}
  .rbtn.on{background:var(--sel);border-color:var(--sel);color:var(--paper)}
  .rbtn.wish.on{background:var(--star);border-color:var(--star);color:#fff}
  .rbtn.fav.on{background:var(--star);border-color:var(--star);color:#fff}
  .authline{font-family:var(--disp);font-size:.72rem;letter-spacing:.03em;color:var(--muted);margin-top:14px}
  /* comments */
  .cmt-list{margin-top:4px}
  .cmt{padding:14px 0;border-bottom:1px solid var(--line)}
  .cmt .who{font-weight:700;font-size:.92rem}
  .cmt .when{color:var(--muted);font-size:.74rem;margin-left:7px}
  .cmt .txt{font-size:.95rem;margin-top:5px;white-space:pre-wrap;word-break:break-word;line-height:1.7}
  .cmt .del{float:right;background:none;border:0;color:var(--muted);font-size:.74rem;cursor:pointer}
  .cmt .del:hover{color:#b23b2e}
  .cmt-empty{color:var(--muted);font-size:.92rem;padding:22px 0;text-align:center}
  .cmt-form{margin-top:16px;display:grid;gap:8px}
  .cmt-form input,.cmt-form textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:.95rem;background:var(--card);color:var(--ink)}
  .cmt-form textarea{resize:vertical;min-height:52px}
  .cmt-form button{padding:13px;border:0;border-radius:10px;background:var(--ink);color:var(--paper);font-weight:700;cursor:pointer;font-family:inherit;justify-self:start;padding-left:28px;padding-right:28px}
  .cmt-form button:hover{opacity:.88}
  .cmt-off{color:var(--muted);font-size:.9rem;padding:20px;text-align:center;line-height:1.7;background:var(--card);border:1px solid var(--line);border-radius:12px}
  /* related */
  .rel{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .relc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;text-decoration:none;transition:.15s;display:block}
  .relc:hover{border-color:var(--ink);transform:translateY(-2px)}
  .relc .flag{height:22px;width:auto;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.15);display:block}
  .relc h4{margin:12px 0 2px;font-size:1.02rem;font-weight:700}
  .relc .en{font-family:var(--disp);color:var(--muted);font-size:.68rem;letter-spacing:.04em;text-transform:uppercase}
  .end{font-family:var(--disp);text-align:center;color:var(--faint);font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;padding:34px 0 56px}
  .notfound{text-align:center;padding:120px 20px}
  .notfound h1{font-size:2rem;margin:0 0 12px}
  .notfound a{font-weight:700}
  /* sub-nav (섹션 바로가기, 스티키) */
  .subnav{position:sticky;top:56px;z-index:4;background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);margin:0 -26px;padding:0 26px}
  .subnav .wrap2{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:10px 0}
  .subnav .wrap2::-webkit-scrollbar{display:none}
  .subnav a{flex:0 0 auto;font-family:var(--disp);font-size:.76rem;font-weight:700;letter-spacing:.02em;color:var(--muted);text-decoration:none;padding:7px 13px;border-radius:999px;border:1px solid transparent;white-space:nowrap;transition:.15s}
  .subnav a:hover{color:var(--ink);border-color:var(--line)}
  .subnav a.active{color:var(--paper);background:var(--sel);border-color:var(--sel)}
  /* stat cards (사람·경제) */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .statcard{border:1px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--card)}
  .statcard .sc-k{font-family:var(--disp);font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .statcard .sc-v{font-family:var(--serif);font-style:italic;font-weight:500;font-size:1.7rem;line-height:1.1;margin-top:8px}
  .statcard .sc-sub{font-size:.74rem;color:var(--faint);margin-top:4px}
  /* neighbor chips */
  .nbrs{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .nbr{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:6px 13px 6px 8px;text-decoration:none;color:inherit;font-size:.86rem;transition:.15s;background:var(--card)}
  .nbr:hover{border-color:var(--ink);transform:translateY(-1px)}
  .nbr.static{opacity:.72;cursor:default}
  .nbr.static:hover{transform:none;border-color:var(--line)}
  .nbr img{height:14px;width:auto;border-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  /* prose (wiki 주제 요약) */
  .prose{color:var(--muted);line-height:1.85;font-size:1rem;max-width:70ch;white-space:pre-wrap}
  .prose.empty{color:var(--faint);font-style:italic}
  .srcline{font-family:var(--disp);font-size:.68rem;letter-spacing:.03em;color:var(--faint);margin-top:14px}
  .srcline a{border-bottom:1px solid var(--line)}
  .miniloc{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:6px}
  .miniloc .coord{font-family:var(--disp);font-size:.9rem;color:var(--ink)}
  @media(max-width:640px){
    .wrap{padding:0 18px}
    .subnav{margin:0 -18px;padding:0 18px}
    .facts{grid-template-columns:1fr;gap:0}
    .place{grid-template-columns:1fr}
    .place .pimg{aspect-ratio:16/9}
  }
</style>
</head>
<body>
  <div class="topbar"><div class="wrap">
    <a class="back" id="backLink" href="index.html">← 세계 국가 도감</a>
    <div class="topbar-right">
      <div class="langsw" id="langsw"><button data-l="ko">KO</button><button data-l="en">EN</button></div>
      <button class="themebtn" id="themebtn" title="다크모드 전환" aria-label="다크모드 전환">🌙</button>
      <span class="brand">World Atlas</span>
    </div>
  </div></div>
  <div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="atlas-data.js?v=1"></script>
<script src="data.js?v=47"></script>
<script>
const code = new URLSearchParams(location.search).get('c');
const c = code && countryByCode(code);
const app = document.getElementById('app');
let me = null;
let THISVIEWS = null;   // 이 나라 조회수(백엔드)

const $langsw = document.getElementById('langsw');
$langsw.querySelectorAll("button").forEach(b => b.onclick = () => { if(b.dataset.l===LANG) return; setLang(b.dataset.l); rerender(); });
const $themebtn = document.getElementById('themebtn');
function applyTheme(){ const dark = localStorage.getItem('theme')!=='light'; document.documentElement.dataset.theme = dark?'dark':''; $themebtn.textContent = dark?'☀️':'🌙'; }
$themebtn.onclick = () => { localStorage.setItem('theme', localStorage.getItem('theme')==='dark'?'light':'dark'); applyTheme(); };
applyTheme();
function applyLangBits(){
  document.documentElement.lang = LANG;
  $langsw.querySelectorAll("button").forEach(b => b.classList.toggle('on', b.dataset.l===LANG));
  document.getElementById('backLink').textContent = t('back');
}

if(!c){
  applyLangBits();
  document.title = t('docTitle');
  app.innerHTML = `<div class="notfound">
    <h1>${t('nfTitle')}</h1>
    <p style="color:var(--muted)">${t('nfDesc')}</p>
    <p style="margin-top:18px"><a href="index.html">${t('nfBack')}</a></p>
  </div>`;
} else {
  start();
}

function start(){
  applyLangBits();
  document.title = `${L.name(c)} · ${t('docTitle')}`;
  render();
  loadHero();
  loadAbout();
  loadTopics();
  initSubnavSpy();
  initAuth();
}
async function loadAbout(){
  const el = document.getElementById('aboutText'); if(!el) return;
  const w = await fetchWiki(L.name(c), LANG);
  if(w && w.extract && w.extract.length > 40){
    el.textContent = w.extract;
    const more = document.getElementById('aboutMore'); if(more) more.style.display = 'inline-block';
  } else { el.style.display = 'none'; }
}
// ===== 인접국 칩 =====
function nbrChip(n){
  if(n.inAtlas){ const cc=countryByCode(n.code); const nm=cc?L.name(cc):n.name; return `<a class="nbr" href="country.html?c=${n.code}"><img src="flags/${n.code}.svg" alt="">${esc(nm)}</a>`; }
  return `<span class="nbr static">🌐 ${esc(n.name)}</span>`;
}
// ===== 주제별 위키백과 요약(지리·역사·문화) — 런타임 fetch + 폴백 =====
function wikiTopics(){
  if(LANG==='en'){ const n=c.nameEn; return {geo:`Geography of ${n}`, hist:`History of ${n}`, cult:`Culture of ${n}`}; }
  const n=c.name; return {geo:`${n}의 지리`, hist:`${n}의 역사`, cult:`${n}의 문화`};
}
async function loadTopic(title, textId, srcId){
  const el=document.getElementById(textId); if(!el) return;
  const w=await fetchWiki(title, LANG);
  if(w && w.extract && w.extract.length>40){
    el.textContent=w.extract; el.classList.remove('empty');
    const s=document.getElementById(srcId); if(s) s.innerHTML=`${t('srcWiki')} · <a href="${w.url||('https://'+LANG+'.wikipedia.org/wiki/'+encodeURIComponent(title))}" target="_blank" rel="noopener">${esc(w.title||title)}</a>`;
  } else { el.textContent=t('noData'); el.classList.add('empty'); }
}
function loadTopics(){ const tp=wikiTopics(); loadTopic(tp.geo,'geoText','geoSrc'); loadTopic(tp.hist,'histText','histSrc'); loadTopic(tp.cult,'cultText','cultSrc'); }
// ===== 서브내비 스크롤 스파이 =====
let spyOn=false;
function initSubnavSpy(){
  if(spyOn) return; spyOn=true;
  addEventListener('scroll', ()=>{
    const links=[...document.querySelectorAll('.subnav a')]; if(!links.length) return;
    const y=scrollY+140; let cur=null;
    links.forEach(a=>{ const s=document.querySelector(a.getAttribute('href')); if(s && s.offsetTop<=y) cur=a; });
    links.forEach(a=>a.classList.toggle('active', a===cur));
  }, {passive:true});
}
// 언어 전환 시: DOM 재구성 + 히어로 다시 로드 + (로그인 상태면) 카운트/댓글 재표시
function rerender(){
  applyLangBits();
  document.title = `${L.name(c)} · ${t('docTitle')}`;
  render();
  loadHero();
  loadAbout();
  loadTopics();
  if(me){ loadMarks(); loadComments(); }
  else { updateViewsFact(); }
}

function render(){
  const related = COUNTRIES.filter(x => x.region===c.region && x.id!==c.id);
  const M = atlasMeta(code);
  const lp = COUNTRIES.map(x=>Math.log10(x.population)), lpMin=Math.min(...lp), lpMax=Math.max(...lp);
  const la = COUNTRIES.map(x=>Math.log10(x.area+1)), laMin=Math.min(...la), laMax=Math.max(...la);
  const pPop = Math.max(3, Math.round((Math.log10(c.population)-lpMin)/(lpMax-lpMin)*100));
  const pArea = Math.max(3, Math.round((Math.log10(c.area+1)-laMin)/(laMax-laMin)*100));
  const svCap = LANG==='en' ? 'Relative size among 40 countries (log scale)' : '40개국 대비 상대 규모 (로그 스케일)';
  app.innerHTML = `
    <div class="hero loading" id="hero">
      <div class="hero-in"><div class="wrap">
        <img class="flag" src="flags/${code}.svg" alt="${esc(L.name(c))}">
        <h1>${esc(L.name(c))}</h1>
        <div class="sub">${esc(LANG==='en'?c.name:c.nameEn)} · ${esc(regionLabel(c.region))}</div>
      </div></div>
      <span class="credit" id="heroCredit"></span>
    </div>

    <div class="wrap">
      <nav class="crumb">
        <a href="index.html">${t('crumbAtlas')}</a><span class="sep">/</span>
        <a href="index.html?region=${encodeURIComponent(c.region)}">${esc(regionLabel(c.region))}</a><span class="sep">/</span>
        <b>${esc(L.name(c))}</b>
      </nav>

      <nav class="subnav"><div class="wrap2" id="subnav">
        <a href="#s-overview">${t('ovOverview')}</a>
        <a href="#s-glance">${t('secAtaGlance')}</a>
        <a href="#s-geo">${t('secGeo')}</a>
        <a href="#s-hist">${t('secHist')}</a>
        <a href="#s-cult">${t('secCult')}</a>
        <a href="#s-people">${t('secPeople')}</a>
        <a href="#s-econ">${t('secEcon')}</a>
        <a href="#s-places">${t('secPlaces')}</a>
      </div></nav>

      <section class="blk" id="s-overview">
        <p class="lead-txt">${esc(L.desc(c))}</p>
        <p class="about-txt" id="aboutText">${t('loadingWiki')}</p>
        <a class="about-more" id="aboutMore" href="https://${LANG}.wikipedia.org/wiki/${encodeURIComponent(L.name(c))}" target="_blank" rel="noopener" style="display:none">${LANG==='en'?'Read more on Wikipedia →':'위키백과에서 더 보기 →'}</a>
      </section>

      <section class="blk" id="s-glance">
        <div class="lbl">${t('secAtaGlance')}</div>
        <div class="facts">
          <div class="fact"><span class="k">${t('kCapital')}</span><span class="v">${esc(L.capital(c))}</span></div>
          ${M&&M.subregion?`<div class="fact"><span class="k">${t('kSubregion')}</span><span class="v">${esc(M.subregion)}</span></div>`:''}
          <div class="fact"><span class="k">${t('kPop')}</span><span class="v">${fmtPop(c.population)}</span></div>
          <div class="fact"><span class="k">${t('kArea')}</span><span class="v">${fmtArea(c.area)}</span></div>

          <div class="fact"><span class="k">${t('kCur')}</span><span class="v">${esc(L.currency(c))}</span></div>
          <div class="fact"><span class="k">${t('kDial')}</span><span class="v">${esc(c.dial)}</span></div>

          <span class="tag">${M?(M.landlocked?t('vLandlockedY'):t('vLandlockedN')):''}</span>

        <div class="srcline" id="geoSrc"></div>

      <section class="blk" id="s-hist">
        <div class="lbl">${t('secHist')}</div>
        <p class="prose" id="histText">${t('loadingWiki')}</p>
        <div class="srcline" id="histSrc"></div>
      </section>

      <section class="blk" id="s-cult">
        <div class="lbl">${t('secCult')}</div>
        <div class="facts" style="margin-bottom:6px">
          <div class="fact"><span class="k">${t('kLang')}</span><span class="v">${esc(L.languages(c))}</span></div>
          <div class="fact"><span class="k">${t('kRel')}</span><span class="v">${esc(L.religion(c))}</span></div>
        </div>
        <p class="prose" id="cultText">${t('loadingWiki')}</p>
        <div class="srcline" id="cultSrc"></div>
      </section>

      <section class="blk" id="s-people">
        <div class="lbl">${t('secPeople')}</div>
        <div class="stat-grid">

          ${M&&M.econ&&M.econ.lifeExp?`<div class="statcard"><div class="sc-k">${t('kLifeExp')}</div><div class="sc-v">${M.econ.lifeExp} ${t('yearsUnit')}</div></div>`:''}
          ${M&&M.econ&&M.econ.urban?`<div class="statcard"><div class="sc-k">${t('kUrban')}</div><div class="sc-v">${M.econ.urban}%</div></div>`:''}
          ${M&&M.demonym?`<div class="statcard"><div class="sc-k">${t('kDemonym')}</div><div class="sc-v" style="font-size:1.2rem">${esc(M.demonym)}</div></div>`:''}
        </div>
        ${M&&M.econ&&M.econ.year?`<div class="srcline">${t('srcWB')} · ${M.econ.year}</div>`:''}
      </section>

      <section class="blk" id="s-econ">
        <div class="lbl">${t('secEcon')}</div>
        <div class="stat-grid">
          ${M&&M.econ&&M.econ.gdp?`<div class="statcard"><div class="sc-k">${t('kGDP')}</div><div class="sc-v">${fmtUSD(M.econ.gdp)}</div><div class="sc-sub">${M.econ.year||''}</div></div>`:''}
          ${M&&M.econ&&M.econ.gdppc?`<div class="statcard"><div class="sc-k">${t('kGDPpc')}</div><div class="sc-v">${fmtUSD(M.econ.gdppc)}</div><div class="sc-sub">${M.econ.year||''}</div></div>`:''}
          <div class="statcard"><div class="sc-k">${t('kCur')}</div><div class="sc-v" style="font-size:1.15rem">${esc(L.currency(c))}</div></div>
        </div>
        ${M&&M.econ&&M.econ.gdp?`<div class="srcline">${t('srcWB')}</div>`:''}
      </section>

      <section class="blk" id="s-flag">
        <div class="lbl">${LANG==='en'?'The Flag':'국기 이야기'}</div>
        <div class="flagblk">
          <img class="fimg" src="flags/${code}.svg" alt="${esc(L.name(c))} 국기">
          <p>${esc(flagMeaning(code))}</p>
        </div>

        <div class="lbl">${t('ovMark')}</div>
        <div class="actions">
          <button class="rbtn" id="bVisited" onclick="toggleMark('visited')">✈️ ${t('visited')} <b id="cVisited">${baseCount(code,'visited')}</b></button>
          <button class="rbtn wish" id="bWish" onclick="toggleMark('wish')">🧡 ${t('wish')} <b id="cWish">${baseCount(code,'wish')}</b></button>
          <button class="rbtn fav" id="bFav" onclick="toggleFav()">${t('markFavOff')}</button>

        <div class="place">
          <div class="pimg" id="placeImg"></div>
          <div>
            <h3 id="placeName">${esc(L.landmark(c))}</h3>
            <p id="placeText" style="color:var(--muted)">${t('loadingWiki')}</p>
            <a class="plink" id="placeLink" href="https://${LANG}.wikipedia.org/wiki/${encodeURIComponent(L.landmark(c))}" target="_blank" rel="noopener">${t('wikiMore')}</a>
          </div>
        </div>
      </section>

      <section class="blk">
        <div class="fun-card">
          <div class="lbl">${t('ovKnow')}</div>
          ${esc(L.fun(c))}
        </div>
      </section>

      <section class="blk">
        <div class="lbl">${t('ovComments')}</div>
        <div class="cmt-list" id="cmtList"><div class="cmt-empty">${sb ? t('cmtLoading') : t('cmtOffList')}</div></div>
        ${ sb ? `<div class="cmt-form">
            <input id="cmtNick" maxlength="20" placeholder="${t('cmtNick')}" value="${esc(localStorage.getItem('nick')||'')}">
            <textarea id="cmtBody" maxlength="300" placeholder="${t('cmtBody')}"></textarea>
            <button onclick="postComment()">${t('cmtPost')}</button>
          </div>` : `<div class="cmt-off">${t('cmtOff')}</div>` }
      </section>

      <section class="blk">
        <div class="lbl">${t('ovMoreIn')} ${esc(regionLabel(c.region))}</div>
        <div class="rel">
          ${related.map(r => { const rc=flagCode(r.flag); return `<a class="relc" href="country.html?c=${rc}">
            <img class="flag" src="flags/${rc}.svg" alt="${esc(L.name(r))}">
            <h4>${esc(L.name(r))}</h4><div class="en">${esc(LANG==='en'?r.name:r.nameEn)}</div>

        </div>

      <div class="end"><a href="index.html" style="text-decoration:none">${t('backToAll')}</a></div>
    </div>`;
  updateViewsFact();
  renderCommentList([]);   // 시드 댓글 먼저 표시(백엔드 연결되면 실제 댓글이 위에 합쳐짐)
}

function updateViewsFact(){
  const el = document.getElementById('factViews'); if(!el) return;
  el.textContent = (THISVIEWS != null) ? (LANG==='en' ? `${THISVIEWS.toLocaleString()} ${t('viewsShort')}` : `${THISVIEWS.toLocaleString()}회`) : (sb ? '…' : '—');
}

// ===== 히어로/명소 이미지 (위키백과: 현재 언어) =====
async function loadHero(){
  const hero = document.getElementById('hero'); if(!hero) return;
  const pos = c.heroPos || 'center 35%';
  const isFlag = u => !u || /Flag_of|\.svg(\?|$)/i.test(u);   // 국기/벡터는 히어로에서 제외
  // 1) 히어로 이미지 — 큐레이션된 c.heroImg(각 나라 대표 실사)를 우선. 없을 때만 위키 폴백.
  let img = c.heroImg || null;
  if(!img){
    const heroTitle = LANG==='en' ? (c.heroTitleEn || L.landmark(c)) : (c.heroTitle || c.landmark);
    let hi = await fetchWiki(heroTitle, LANG);
    if(!hi || !hi.img || isFlag(hi.img)){ const w2 = await fetchWiki(L.name(c), LANG); if(w2 && w2.img && !isFlag(w2.img)) hi = w2; }
    if(hi && hi.img && !isFlag(hi.img)) img = hi.img;
  }
  if(img){
    const im = new Image();
    im.onload = () => { hero.style.backgroundImage = `url("${img}")`; hero.style.backgroundPosition = pos; hero.classList.remove('loading'); };
    im.src = img;
    const hc = document.getElementById('heroCredit'); if(hc) hc.textContent = t('photoCredit');
    const pimg = document.getElementById('placeImg'); if(pimg){ pimg.style.backgroundImage = `url("${img}")`; pimg.style.backgroundPosition = pos; }
  }
  // 2) 대표 명소 해설 — landmark 기준 위키 요약(있으면).
  const lm = await fetchWiki(L.landmark(c), LANG);
  const extract = (lm && lm.extract) || "";
  const pt = document.getElementById('placeText');
  if(pt){ pt.textContent = extract || (LANG==='en' ? `${L.landmark(c)}, the landmark of ${L.name(c)}.` : `${c.name}의 대표 명소인 ${c.landmark}입니다.`); pt.style.color = ""; }
}

// ===== 백엔드 (Supabase) =====
async function initAuth(){
  const line = document.getElementById('authline');
  if(!sb){ if(line) line.textContent = t('beOffCountry'); updateViewsFact(); return; }
  try{
    let { data:{ user } } = await sb.auth.getUser();
    if(!user){ const r = await sb.auth.signInAnonymously(); if(r.error) throw r.error; user = r.data.user; }
    me = user.id;
    if(line) line.textContent = t('beOn');
    await logView(code, me);        // 이 나라 조회 기록(세션 1회)
    await loadMarks();
    loadComments();
  }catch(e){ if(line) line.textContent = t('beFail') + e.message; updateViewsFact(); }
}
async function loadMarks(){
  const [all, mine, fav, vc] = await Promise.all([
    sb.from('country_marks').select('kind').eq('code', code),
    sb.from('country_marks').select('kind').eq('code', code).eq('user_id', me),
    sb.from('favorites').select('code').eq('code', code).eq('user_id', me),
    getViewCounts()
  ]);
  const cnt = {visited:0, wish:0}; (all.data||[]).forEach(r => cnt[r.kind]!==undefined && cnt[r.kind]++);
  const bv=document.getElementById('cVisited'), bw=document.getElementById('cWish');
  if(bv) bv.textContent = baseCount(code,'visited') + cnt.visited; if(bw) bw.textContent = baseCount(code,'wish') + cnt.wish;
  const myset = new Set((mine.data||[]).map(r=>r.kind));
  const eV=document.getElementById('bVisited'), eW=document.getElementById('bWish');
  if(eV) eV.classList.toggle('on', myset.has('visited'));
  if(eW) eW.classList.toggle('on', myset.has('wish'));
  const fon = (fav.data||[]).length>0;
  const bf = document.getElementById('bFav'); if(bf){ bf.classList.toggle('on', fon); bf.innerHTML = fon ? t('markFavOn') : t('markFavOff'); }
  THISVIEWS = (vc && vc[code]) || 0; updateViewsFact();
}
async function toggleMark(kind){
  if(!sb){ alert(t('beNeed')); return; }
  const on = document.getElementById(kind==='visited'?'bVisited':'bWish').classList.contains('on');
  if(on){ await sb.from('country_marks').delete().match({user_id:me, code, kind}); }
  else  { await sb.from('country_marks').insert({user_id:me, code, kind}); }
  loadMarks();
}
async function toggleFav(){
  if(!sb){ alert(t('beNeed')); return; }
  const on = document.getElementById('bFav').classList.contains('on');
  if(on){ await sb.from('favorites').delete().match({user_id:me, code}); }
  else  { await sb.from('favorites').insert({user_id:me, code}); }
  loadMarks();
}
function renderCommentList(dbData){
  const list = document.getElementById('cmtList'); if(!list) return;
  const now = Date.now();
  const seeds = (typeof SEED_COMMENTS!=='undefined' ? (SEED_COMMENTS[code]||[]) : []).map((s,i)=>({
    id:'seed'+i, nickname:s.n, body:s.b, user_id:'seed', created_at:new Date(now - s.d*86400000).toISOString()
  }));
  const all = [...(dbData||[]), ...seeds].sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));
  if(!all.length){ list.innerHTML = `<div class="cmt-empty">${t('cmtEmpty')}</div>`; return; }
  const loc = LANG==='en' ? 'en-US' : 'ko-KR';
  list.innerHTML = all.map(cm => `<div class="cmt">
      ${cm.user_id===me ? `<button class="del" onclick="delComment(${cm.id})">${t('cmtDel')}</button>` : ""}
      <div class="who">${esc(cm.nickname)}<span class="when">${new Date(cm.created_at).toLocaleDateString(loc,{month:'short',day:'numeric'})}</span></div>
      <div class="txt">${esc(cm.body)}</div>
    </div>`).join("");
}
async function loadComments(){
  const { data, error } = await sb.from('comments').select('*').eq('code', code).order('created_at', {ascending:false});
  renderCommentList(error ? [] : data);   // 에러여도 시드 댓글은 표시
}
async function postComment(){
  const nick = (document.getElementById('cmtNick').value||"").trim(), body = (document.getElementById('cmtBody').value||"").trim();
  if(!nick || !body){ alert(t('cmtNeedBoth')); return; }
  localStorage.setItem('nick', nick);
  const { error } = await sb.from('comments').insert({ code, user_id:me, nickname:nick.slice(0,20), body:body.slice(0,300) });
  if(error){ alert((LANG==='en'?"Failed: ":"등록 실패: ") + error.message); return; }
  document.getElementById('cmtBody').value = "";
  loadComments();
}
async function delComment(id){
  if(!confirm(t('cmtDelConfirm'))) return;
  const { error } = await sb.from('comments').delete().eq('id', id);
  if(error){ alert((LANG==='en'?"Delete failed: ":"삭제 실패: ") + error.message); return; }
  loadComments();
}
</script>
